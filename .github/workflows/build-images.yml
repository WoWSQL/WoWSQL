name: Build & Push Docker Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. 1.0.0)'
        required: true

env:
  REGISTRY: docker.io
  ORG: wowsql

jobs:
  build-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WoWSQL/wowmysql
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./services/wowsql-auth
          push: true
          tags: |
            ${{ env.ORG }}/auth:latest
            ${{ env.ORG }}/auth:${{ github.ref_name || inputs.version }}
          platforms: linux/amd64,linux/arm64

  build-storage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WoWSQL/wowmysql
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./services/wowsql-storage
          push: true
          tags: |
            ${{ env.ORG }}/storage:latest
            ${{ env.ORG }}/storage:${{ github.ref_name || inputs.version }}
          platforms: linux/amd64,linux/arm64

  build-realtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WoWSQL/wowmysql
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./services/wowsql-realtime
          push: true
          tags: |
            ${{ env.ORG }}/realtime:latest
            ${{ env.ORG }}/realtime:${{ github.ref_name || inputs.version }}
          platforms: linux/amd64,linux/arm64

  build-studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WoWSQL/wowmysql
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          build-args: |
            SELF_HOSTED=true
            NEXT_PUBLIC_API_URL=http://localhost:8080
          tags: |
            ${{ env.ORG }}/studio:latest
            ${{ env.ORG }}/studio:${{ github.ref_name || inputs.version }}
          platforms: linux/amd64,linux/arm64

  build-postgres:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: WoWSQL/wowmysql
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./docker/postgres
          push: true
          tags: |
            ${{ env.ORG }}/postgres:18
            ${{ env.ORG }}/postgres:latest
          platforms: linux/amd64,linux/arm64

  update-versions:
    needs: [build-auth, build-storage, build-realtime, build-studio, build-postgres]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update versions.md
        run: |
          VERSION="${{ github.ref_name || inputs.version }}"
          DATE=$(date -u +"%Y-%m-%d")
          echo "| $DATE | $VERSION | $VERSION | $VERSION | $VERSION | 18 |" >> docker/versions.md
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docker/versions.md
          git commit -m "release: update versions for $VERSION" || true
          git push || true
